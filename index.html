<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eco Word Hunt - Kids Versus Mode</title>
    <style>
        :root {
            --primary-color: #2980b9;
            --accent-color: #e74c3c;
            --tile-bg: #ffffff;
            --tile-selected: #f1c40f;
            --tile-found-a: #2ecc71;
            --tile-found-b: #9b59b6;
            --text-color: #2c3e50;
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Segoe UI', sans-serif;
            /* Animated, vibrant environmental gradient representing ice, water, and aurora */
            background: linear-gradient(-45deg, #00c6ff, #0072ff, #24fe41, #f7ff00);
            background-size: 400% 400%;
            animation: auroraBackground 15s ease infinite;
            color: #fff;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        @keyframes auroraBackground {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        header {
            background-color: rgba(41, 128, 185, 0.85);
            backdrop-filter: blur(5px);
            text-align: center;
            padding: 10px 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 10;
            border-bottom: 3px solid #fff;
        }

        header h1 {
            margin: 0;
            font-size: 1.8rem;
            text-shadow: 2px 2px 0px #000;
            letter-spacing: 1px;
        }

        header p {
            margin: 4px 0 0 0;
            font-size: 0.95rem;
            color: #fff;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        /* Split Screen Container */
        #arena {
            display: flex;
            flex: 1;
            width: 100%;
            height: calc(100vh - 70px);
            position: relative;
        }

        /* Lightning Center Divider Line */
        #divider {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 10px;
            background: #ff9f43;
            transform: translateX(-50%);
            z-index: 5;
            box-shadow: 0 0 15px #ff9f43, 0 0 5px #fff;
            border-radius: 10px;
        }

        /* Team Side Columns */
        .team-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            align-items: center;
            justify-content: space-between;
            height: 100%;
        }

        /* Distinct cartoon transparent overlay plates */
        #side-a { 
            background-color: rgba(26, 188, 156, 0.25); 
        }
        #side-b { 
            background-color: rgba(155, 89, 182, 0.25); 
        }

        /* Meta Dashboards */
        .team-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.9);
            padding: 8px 20px;
            border-radius: 50px;
            box-sizing: border-box;
            margin-bottom: 15px;
            box-shadow: 0 6px 0px rgba(0,0,0,0.15);
            border: 3px solid #fff;
        }

        .team-name {
            font-size: 1.6rem;
            font-weight: 900;
            text-shadow: 1px 1px 0px #fff;
        }
        #side-a .team-name { color: #2ecc71; text-shadow: 2px 2px 0px #16a085; color: #fff;}
        #side-b .team-name { color: #9b59b6; text-shadow: 2px 2px 0px #8e44ad; color: #fff;}
        
        #side-a .team-header { background: #2ecc71; border-color: #fff; }
        #side-b .team-header { background: #9b59b6; border-color: #fff; }

        .timer-box {
            background: #ff7675;
            padding: 6px 16px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 1.1rem;
            border: 2px solid #fff;
            box-shadow: inset 0 -3px 0 rgba(0,0,0,0.2);
        }

        .score-box {
            background: #f1c40f;
            color: #fff;
            text-shadow: 1px 1px 0px #d35400;
            padding: 6px 16px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 1.1rem;
            border: 2px solid #fff;
            box-shadow: inset 0 -3px 0 rgba(0,0,0,0.2);
        }

        /* Gameplay Core Layout */
        .main-playarea {
            display: flex;
            width: 100%;
            gap: 20px;
            flex: 1;
            align-items: center;
            justify-content: center;
            min-height: 0;
        }

        /* 14 columns Grid Layout */
        .word-grid {
            display: grid;
            grid-template-columns: repeat(14, 1fr);
            gap: 4px;
            background: rgba(255, 255, 255, 0.5);
            padding: 8px;
            border-radius: 12px;
            touch-action: none;
            width: 100%;
            max-width: 480px;
            aspect-ratio: 1;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            border: 4px solid #fff;
        }

        .tile {
            aspect-ratio: 1;
            background-color: var(--tile-bg);
            color: var(--text-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: clamp(1rem, 2vh, 1.3rem);
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 3px 0px #bdc3c7;
            transition: transform 0.1s;
        }

        .tile.selected {
            background-color: var(--tile-selected);
            color: #fff;
            text-shadow: 1px 1px 0px #d35400;
            transform: scale(1.15);
            box-shadow: 0 4px 0px #d35400;
            z-index: 2;
        }

        #side-a .tile.found { 
            background-color: #2ecc71; 
            color: white; 
            box-shadow: 0 3px 0px #27ae60;
        }
        #side-b .tile.found { 
            background-color: #3498db; 
            color: white; 
            box-shadow: 0 3px 0px #2980b9;
        }

        /* Sidebar Word lists */
        .word-list-container {
            background: rgba(255, 255, 255, 0.9);
            color: #2c3e50;
            padding: 12px;
            border-radius: 12px;
            width: 150px;
            height: 85%;
            overflow-y: auto;
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
            border: 3px solid #fff;
        }

        .word-list-container h3 {
            margin: 0 0 10px 0;
            font-size: 1rem;
            text-align: center;
            color: #2980b9;
            border-bottom: 3px dashed #bdc3c7;
            padding-bottom: 6px;
        }

        .word-item {
            padding: 5px 2px;
            font-size: 0.85rem;
            font-weight: bold;
            text-transform: uppercase;
            color: #34495e;
            text-align: center;
            background: #ecf0f1;
            margin-bottom: 5px;
            border-radius: 6px;
        }

        .word-item.found {
            text-decoration: line-through;
            background: #bdc3c7;
            color: #7f8c8d;
            opacity: 0.6;
        }

        /* End Game Popups */
        .end-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(41, 128, 185, 0.95);
            z-index: 100;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
        }

        .end-screen h2 { 
            font-size: 4rem; 
            margin-bottom: 10px; 
            color: #f1c40f;
            text-shadow: 3px 3px 0px #000;
        }
        .end-screen p { font-size: 1.8rem; margin-bottom: 30px; text-shadow: 1px 1px 4px rgba(0,0,0,0.5); }
        
        .score-summary {
            display: flex;
            gap: 40px;
            margin-bottom: 40px;
        }
        .score-card {
            background: #fff;
            color: #2c3e50;
            padding: 20px 40px;
            border-radius: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            box-shadow: 0 10px 0px rgba(0,0,0,0.2);
        }
        .score-card span { 
            font-weight: 900; 
            display: block; 
            font-size: 3rem; 
            margin-top: 5px;
        }

        .end-screen button {
            padding: 15px 50px;
            font-size: 1.5rem;
            font-weight: 900;
            background: #e67e22;
            color: white;
            border: 4px solid #fff;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 0px #d35400;
            text-shadow: 1px 1px 0px #000;
        }
        .end-screen button:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0px #d35400;
        }
    </style>
</head>
<body>

    <header>
        <h1>🌍 Eco Kids Word Hunt 🐻</h1>
        <p>Swipe your finger on the letters! Find the words fast for bonus points!</p>
    </header>

    <div id="arena">
        <div id="divider"></div>

        <div class="team-side" id="side-a">
            <div class="team-header">
                <div class="team-name">🟢 TEAM A</div>
                <div class="timer-box" id="timer-a">03:00</div>
                <div class="score-box" id="score-a">⭐ 0</div>
            </div>
            <div class="main-playarea">
                <div class="word-grid" id="grid-a"></div>
                <div class="word-list-container">
                    <h3>Word Bank</h3>
                    <div id="list-a"></div>
                </div>
            </div>
        </div>

        <div class="team-side" id="side-b">
            <div class="team-header">
                <div class="team-name">🔵 TEAM B</div>
                <div class="timer-box" id="timer-b">03:00</div>
                <div class="score-box" id="score-b">⭐ 0</div>
            </div>
            <div class="main-playarea">
                <div class="word-grid" id="grid-b"></div>
                <div class="word-list-container">
                    <h3>Word Bank</h3>
                    <div id="list-b"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="end-screen" id="end-screen">
        <h2 id="winner-title">👑 Match Over! 👑</h2>
        <p id="winner-msg"></p>
        <div class="score-summary">
            <div class="score-card" style="border: 4px solid #2ecc71;">Team A Score <span id="final-a" style="color: #2ecc71;">0</span></div>
            <div class="score-card" style="border: 4px solid #3498db;">Team B Score <span id="final-b" style="color: #3498db;">0</span></div>
        </div>
        <button onclick="resetMatch()">PLAY AGAIN!</button>
    </div>

    <script>
        const gridData = [
            ["D","U","M","N","M","X","D","P","J","K","E","U","O","X"],
            ["P","Y","R","Q","U","V","L","B","R","M","N","G","I","Z"],
            ["V","T","Z","I","U","E","S","E","Z","O","I","G","T","M"],
            ["M","F","Q","G","M","Y","G","L","D","N","T","E","T","C"],
            ["R","D","H","A","U","A","Q","Y","F","R","X","E","T","V"],
            ["C","E","N","V","I","R","O","N","M","E","N","T","C","M"],
            ["H","V","D","T","W","Q","D","H","M","E","L","T","H","T"],
            ["U","E","E","R","M","O","W","A","F","F","E","C","T","S"],
            ["U","A","P","Z","R","I","S","E","J","J","J","Q","D","G"],
            ["O","B","E","P","D","V","B","E","S","D","F","Z","J","Y"],
            ["I","D","N","B","A","N","T","A","R","C","T","I","C","A"],
            ["Y","J","D","K","I","F","U","D","N","U","W","L","X","R"],
            ["C","C","L","I","M","A","T","E","C","H","A","N","G","E"],
            ["B","D","V","C","F","L","H","I","Z","Q","Q","W","I","T"]
        ];

        const targetWords = ["ANTARCTICA", "CLIMATE CHANGE", "PROTECT", "MELT", "ENVIRONMENT", "AFFECTS", "RISE", "DEPEND"];
        const targetWordsClean = targetWords.map(w => w.replace(/\s+/g, ''));

        const gameState = {
            a: { found: [], score: 0, timeLeft: 180, dragging: false, selection: [], finished: false },
            b: { found: [], score: 0, timeLeft: 180, dragging: false, selection: [], finished: false }
        };

        let loopInterval = null;

        function initMatch() {
            clearInterval(loopInterval);
            document.getElementById('end-screen').style.display = 'none';

            setupSide('a', 'grid-a', 'list-a');
            setupSide('b', 'grid-b', 'list-b');

            gameState.a = { found: [], score: 0, timeLeft: 180, dragging: false, selection: [], finished: false };
            gameState.b = { found: [], score: 0, timeLeft: 180, dragging: false, selection: [], finished: false };

            updateUIDash('a');
            updateUIDash('b');

            loopInterval = setInterval(() => {
                let bothDone = true;

                ['a', 'b'].forEach(side => {
                    if (!gameState[side].finished) {
                        gameState[side].timeLeft--;
                        updateTimerDisplay(side);
                        
                        if (gameState[side].timeLeft <= 0) {
                            gameState[side].finished = true;
                        }
                        bothDone = false;
                    }
                });

                if (bothDone) endMatch();
            }, 1000);
        }

        function setupSide(side, gridId, listId) {
            const gridEl = document.getElementById(gridId);
            const listEl = document.getElementById(listId);
            gridEl.innerHTML = '';
            listEl.innerHTML = '';

            for (let r = 0; r < 14; r++) {
                for (let c = 0; c < 14; c++) {
                    const tile = document.createElement('div');
                    tile.classList.add('tile');
                    tile.textContent = gridData[r][c];
                    tile.dataset.row = r;
                    tile.dataset.col = c;
                    gridEl.appendChild(tile);
                }
            }

            targetWords.forEach(word => {
                const div = document.createElement('div');
                div.classList.add('word-item');
                div.id = `word-${side}-${word.replace(/\s+/g, '')}`;
                div.textContent = word;
                listEl.appendChild(div);
            });

            setupListeners(side, gridEl);
        }

        function updateTimerDisplay(side) {
            const time = gameState[side].timeLeft;
            const mins = Math.floor(time / 60).toString().padStart(2, '0');
            const secs = (time % 60).toString().padStart(2, '0');
            document.getElementById(`timer-${side}`).textContent = `⏱️ ${mins}:${secs}`;
        }

        function updateUIDash(side) {
            updateTimerDisplay(side);
            document.getElementById(`score-${side}`).textContent = `⭐ ${gameState[side].score}`;
        }

        function setupListeners(side, gridEl) {
            // Mouse
            gridEl.addEventListener('mousedown', (e) => {
                const tile = e.target.closest('.tile');
                if (tile && !gameState[side].finished) startDrag(side, tile);
            });

            window.addEventListener('mousemove', (e) => {
                if (!gameState[side].dragging) return;
                const el = document.elementFromPoint(e.clientX, e.clientY);
                if (el) {
                    const tile = el.closest(`#grid-${side} .tile`);
                    if (tile) handleDrag(side, tile);
                }
            });

            window.addEventListener('mouseup', () => endDrag(side));

            // Touch
            gridEl.addEventListener('touchstart', (e) => {
                if (gameState[side].finished) return;
                const touch = e.touches[0];
                const el = document.elementFromPoint(touch.clientX, touch.clientY);
                if (el) {
                    const tile = el.closest(`#grid-${side} .tile`);
                    if (tile) {
                        e.preventDefault();
                        startDrag(side, tile);
                    }
                }
            }, { passive: false });

            gridEl.addEventListener('touchmove', (e) => {
                if (!gameState[side].dragging) return;
                const touch = e.touches[0];
                const el = document.elementFromPoint(touch.clientX, touch.clientY);
                if (el) {
                    const tile = el.closest(`#grid-${side} .tile`);
                    if (tile) {
                        e.preventDefault();
                        handleDrag(side, tile);
                    }
                }
            }, { passive: false });

            gridEl.addEventListener('touchend', () => endDrag(side));
        }

        function startDrag(side, tile) {
            gameState[side].dragging = true;
            gameState[side].selection = [tile];
            tile.classList.add('selected');
        }

        function handleDrag(side, tile) {
            const sel = gameState[side].selection;
            if (sel.includes(tile)) {
                if (sel.length > 1 && sel[sel.length - 2] === tile) {
                    const popped = sel.pop();
                    popped.classList.remove('selected');
                }
                return;
            }

            const last = sel[sel.length - 1];
            const r1 = parseInt(last.dataset.row), c1 = parseInt(last.dataset.col);
            const r2 = parseInt(tile.dataset.row), c2 = parseInt(tile.dataset.col);

            if (Math.abs(r1 - r2) <= 1 && Math.abs(c1 - c2) <= 1 && (r1 !== r2 || c1 !== c2)) {
                if (sel.length >= 2) {
                    const first = sel[0];
                    const rStart = parseInt(first.dataset.row), cStart = parseInt(first.dataset.col);
                    if (Math.sign(r2 - r1) !== Math.sign(r1 - rStart) && Math.sign(r1 - rStart) !== 0) return;
                    if (Math.sign(c2 - c1) !== Math.sign(c1 - cStart) && Math.sign(c1 - cStart) !== 0) return;
                }
                sel.push(tile);
                tile.classList.add('selected');
            }
        }

        function endDrag(side) {
            if (!gameState[side].dragging) return;
            gameState[side].dragging = false;

            const sel = gameState[side].selection;
            const parsedWord = sel.map(t => t.textContent).join('');
            const reversedWord = [...parsedWord].reverse().join('');

            let wordIdx = targetWordsClean.indexOf(parsedWord);
            if (wordIdx === -1) wordIdx = targetWordsClean.indexOf(reversedWord);

            if (wordIdx !== -1) {
                const cleanWord = targetWordsClean[wordIdx];
                if (!gameState[side].found.includes(cleanWord)) {
                    gameState[side].found.push(cleanWord);

                    const speedBonus = Math.floor(gameState[side].timeLeft * 2.5);
                    gameState[side].score += (200 + speedBonus);

                    sel.forEach(t => {
                        t.classList.remove('selected');
                        t.classList.add('found');
                    });

                    document.getElementById(`word-${side}-${cleanWord}`).classList.add('found');
                    updateUIDash(side);

                    if (gameState[side].found.length === targetWords.length) {
                        gameState[side].finished = true;
                        if (gameState.a.finished && gameState.b.finished) {
                            endMatch();
                        }
                    }
                }
            }

            sel.forEach(t => t.classList.remove('selected'));
            gameState[side].selection = [];
        }

        function endMatch() {
            clearInterval(loopInterval);
            const scoreA = gameState.a.score;
            const scoreB = gameState.b.score;

            document.getElementById('final-a').textContent = scoreA;
            document.getElementById('final-b').textContent = scoreB;

            let winnerMsg = "";
            if (scoreA > scoreB) {
                winnerMsg = "🎉 Awesome! Team A wins the big trophy! 🏆";
            } else if (scoreB > scoreA) {
                winnerMsg = "🎉 Fantastic! Team B wins the big trophy! 🏆";
            } else {
                winnerMsg = "🤝 Wow! It's a double-winner tie score! 🤝";
            }

            document.getElementById('winner-msg').textContent = winnerMsg;
            document.getElementById('end-screen').style.display = 'flex';
        }

        function resetMatch() {
            initMatch();
        }

        window.onload = initMatch;
    </script>
</body>
</html>
